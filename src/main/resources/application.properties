spring.application.name=recipe-api
server.port=8080

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-miqo8-osvaldomarkaj88-452a.i.aivencloud.com}:${DB_PORT:15201}/${DB_NAME:defaultdb}?sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info
